apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hospital
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/galeyro/Web-page-hospital.git
    targetRevision: HEAD
    path: kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: hospital
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
